<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibes | HANO V16.0 👑</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        :root { --primary: #00d2ff; --gold: #ffd700; --bg: #050a0e; --card-bg: #0d151c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { font-family: 'Cairo', sans-serif; margin: 0; background: var(--bg); color: #fff; min-height: 100vh; overflow-x: hidden; padding-bottom: 90px; }

        #intro-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; transition: opacity 1.5s ease; }
        .hano-title { font-size: 5rem; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 15px; text-shadow: 0 0 20px rgba(255, 215, 0, 0.5), 0 0 40px rgba(255, 215, 0, 0.3); animation: cinematicReveal 4s forwards; opacity: 0; }
        .present-text { font-size: 1rem; color: var(--gold); letter-spacing: 5px; margin-top: 20px; opacity: 0; animation: fadeIn 2s 1s forwards; }
        @keyframes cinematicReveal { 0% { opacity: 0; transform: scale(0.8); letter-spacing: 30px; filter: blur(10px); } 50% { opacity: 1; filter: blur(0); } 100% { opacity: 1; transform: scale(1.1); letter-spacing: 10px; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 0.7; } }

        #main-app { opacity: 0; transition: opacity 1s ease; visibility: hidden; }
        #main-app.show { opacity: 1; visibility: visible; }

        header { padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; background: rgba(5,10,14,0.9); z-index: 100; backdrop-filter: blur(10px); }
        header h1 { margin: 0; font-size: 1.6rem; font-weight: 900; color: var(--primary); }

        .container { padding: 15px; max-width: 550px; margin: auto; }
        
        .card { background: var(--card-bg); border-radius: 25px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; }
        video { width: 100%; max-height: 70vh; background: #000; object-fit: cover; display: block; }
        .card-content { padding: 15px; }
        .card-top h3 { margin: 0 0 10px 0; font-size: 1.1rem; font-weight: 800; }
        
        .status-card { background: linear-gradient(135deg, rgba(0, 210, 255, 0.1), rgba(0, 0, 0, 0)); padding: 40px 20px; border-radius: 25px; margin-bottom: 30px; border: 1px solid rgba(0, 210, 255, 0.2); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .status-text { font-size: 1.5rem; font-weight: 800; line-height: 1.6; color: #fff; }

        .action-bar { display: flex; gap: 20px; align-items: center; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; flex-wrap: wrap; }
        .action-group { display: flex; align-items: center; gap: 8px; color: #aaa; cursor: pointer; transition: 0.3s; font-size: 1.3rem; }
        .action-group:hover { color: #fff; }
        .action-group.liked { color: #ff4b4b; }
        .action-count { font-size: 1rem; font-weight: 700; color: #fff; }
        .time-badge { font-size: 0.75rem; color: #666; margin-right: auto; }

        .bottom-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; height: 75vh; background: #111a22; border-radius: 30px 30px 0 0; z-index: 99999; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; box-shadow: 0 -10px 40px rgba(0,0,0,0.8); border-top: 1px solid rgba(255,255,255,0.1); }
        .bottom-sheet.open { bottom: 0; }
        .sheet-header { padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); position: relative; }
        .sheet-header h3 { margin: 0; font-weight: 800; }
        .close-sheet { position: absolute; left: 20px; top: 20px; font-size: 1.5rem; color: #aaa; cursor: pointer; }
        
        .comments-list { flex: 1; overflow-y: auto; padding: 20px; }
        .comment-item { display: flex; gap: 15px; margin-bottom: 20px; }
        .c-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); display: flex; justify-content: center; align-items: center; font-weight: bold; color: #000; flex-shrink: 0; }
        .c-body { background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 0 20px 20px 20px; flex: 1; }
        .c-name { display: block; font-size: 0.8rem; color: var(--primary); font-weight: 800; margin-bottom: 5px; }
        .c-text { font-size: 0.95rem; line-height: 1.4; }

        .comment-input-zone { padding: 15px; background: #0b1116; display: flex; gap: 10px; align-items: center; padding-bottom: 30px; }
        .comment-input-zone input { flex: 1; padding: 15px; border-radius: 25px; border: none; background: rgba(255,255,255,0.1); color: #fff; font-family: 'Cairo'; outline: none; }
        .send-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--primary); color: #000; border: none; font-size: 1.2rem; display: flex; justify-content: center; align-items: center; cursor: pointer; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 80px; display: flex; background: rgba(5, 10, 14, 0.95); backdrop-filter: blur(25px); border-top: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
        .nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; transition: 0.3s; cursor: pointer; }
        .nav-link.active { color: var(--primary); transform: translateY(-3px); }
        .nav-link i { font-size: 1.5rem; }
        .nav-link p { font-size: 0.75rem; margin-top: 5px; font-weight: 800; }

        .hano-fab { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); width: 70px; height: 70px; background: linear-gradient(135deg, var(--primary), var(--gold)); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 2rem; color: #000; z-index: 1001; cursor: pointer; border: 5px solid var(--bg); box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 99999; display: none; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .modal-overlay.open { display: flex; }
        .modal-card { width: 90%; max-width: 400px; padding: 30px; border-radius: 30px; background: #0f171d; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        input[type="text"], input[type="password"], select, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px; border: none; background: rgba(255,255,255,0.05); color: #fff; font-family: 'Cairo'; outline: none; }
        textarea { resize: none; height: 120px; }
        .btn-gold { background: var(--primary); color: #000; border: none; padding: 15px; border-radius: 15px; width: 100%; font-weight: 900; cursor: pointer; font-size: 1.1rem; }
        
        /* زرار التفعيل السماح بالتنزيل */
        .toggle-box { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin: 10px 0; }
        .toggle-box span { font-weight: bold; font-size: 0.95rem; }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(24px); }

        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #000; padding: 10px 25px; border-radius: 20px; font-weight: 800; opacity: 0; transition: 0.3s; z-index: 999999; }
        .toast.show { opacity: 1; top: 40px; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="hano-title">HANO</div>
        <div class="present-text">P R E S E N T S</div>
    </div>

    <div class="toast" id="toast">✅</div>

    <div id="main-app">
        <header>
            <h1>Vibes 👑</h1>
            <div id="admin-tag" style="background: var(--gold); color: #000; padding: 3px 12px; border-radius: 15px; font-weight: 900; font-size: 0.7rem; display: none;">HANO CONTROL</div>
        </header>

        <div class="container">
            <div id="v-page" class="tab-content"><div class="media-grid" id="v-data"></div></div>
            <div id="s-page" class="tab-content" style="display:none;"><div class="media-grid" id="s-data"></div></div>
        </div>

        <div class="nav-bar">
            <div class="nav-link active" onclick="switchPage('v-page', this)"><i class="fa-solid fa-clapperboard"></i><p>فيديوهات</p></div>
            <div style="width:20%"></div>
            <div class="nav-link" onclick="switchPage('s-page', this)"><i class="fa-solid fa-pen-nib"></i><p>حالات (كلام)</p></div>
        </div>

        <div class="hano-fab" onclick="openAdmin()"><i class="fa-solid fa-plus"></i></div>
    </div>

    <div class="bottom-sheet" id="commentsSheet">
        <div class="sheet-header">
            <h3>التعليقات 💬</h3>
            <i class="fa-solid fa-times close-sheet" onclick="closeComments()"></i>
        </div>
        <div class="comments-list" id="commentsList"></div>
        <div class="comment-input-zone">
            <input type="text" id="newComment" placeholder="اكتب تعليقك هنا...">
            <button class="send-btn" onclick="sendComment()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <div class="modal-overlay" id="nameModal">
        <div class="modal-card">
            <h2>مين معانا؟ 👀</h2>
            <p style="color:#aaa; font-size:0.9rem;">اكتب اسمك عشان يظهر في التعليقات</p>
            <input type="text" id="userNameInput" placeholder="اسمك إيه يا بطل؟">
            <button class="btn-gold" onclick="saveName()">حفظ الاسم</button>
            <p onclick="closeM('nameModal')" style="margin-top:15px; color:#ff4b4b; cursor:pointer;">إلغاء</p>
        </div>
    </div>

    <div class="modal-overlay" id="passModal">
        <div class="modal-card">
            <h2>دخول HANO 🔐</h2>
            <input type="password" id="passCode" placeholder="كلمة السر...">
            <button class="btn-gold" onclick="verifyAdmin()">فتح السيطرة</button>
            <p onclick="closeM('passModal')" style="margin-top:20px; color:#ff4b4b; cursor:pointer; font-weight:800;">إلغاء</p>
        </div>
    </div>

    <div class="modal-overlay" id="uploadModal">
        <div class="modal-card">
            <h2>نشر جديد ✨</h2>
            <select id="vType" onchange="toggleUploadMode()">
                <option value="videos">رفع فيديو 🎬</option>
                <option value="statuses">كتابة حالة (كلام) 📝</option>
            </select>
            
            <div id="videoUploadMode">
                <input type="text" id="vTitle" placeholder="عنوان الفيديو...">
                <input type="file" id="vFile" accept="video/*">
                <div class="toggle-box">
                    <span>السماح للمستخدمين بتنزيل الفيديو؟</span>
                    <label class="switch">
                        <input type="checkbox" id="allowDownload" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div id="textUploadMode" style="display:none;">
                <textarea id="sTextInput" placeholder="بتفكر في إيه؟ اكتب حالتك هنا..."></textarea>
            </div>

            <div id="upStatus" style="margin:15px 0; color:var(--primary); font-weight:900; display:none;">جاري النشر...</div>
            <button class="btn-gold" id="startUp">انشر دلوقتي</button>
            <p onclick="closeM('uploadModal')" style="margin-top:20px; color:#ff4b4b; cursor:pointer;">قفل</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        // ضفنا remove عشان زرار المسح
        import { getDatabase, ref, onValue, push, set, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDoyrNQabdqsX_VGMI8hGTz0DNFRKwcDkg",
            authDomain: "saldjs-74873.firebaseapp.com",
            databaseURL: "https://saldjs-74873-default-rtdb.firebaseio.com",
            projectId: "saldjs-74873",
            storageBucket: "saldjs-74873.firebasestorage.app",
            messagingSenderId: "886959197654",
            appId: "1:886959197654:web:44bc8a27581815accb2877"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let isHano = false;
        const SECRET = "123";
        let currentUserName = localStorage.getItem('vibes_username');

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('intro-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('intro-screen').style.display = 'none';
                    document.getElementById('main-app').classList.add('show');
                }, 1000);
            }, 3500);

            if(localStorage.getItem('isHano') === 'true') {
                isHano = true;
                document.getElementById('admin-tag').style.display = 'block';
            }
        });

        window.switchPage = (id, el) => {
            document.querySelectorAll('.tab-content').forEach(x => x.style.display = 'none');
            document.querySelectorAll('.nav-link').forEach(x => x.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            el.classList.add('active');
        };
        window.closeM = (id) => document.getElementById(id).classList.remove('open');
        window.toast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        };

        window.openAdmin = () => isHano ? document.getElementById('uploadModal').classList.add('open') : document.getElementById('passModal').classList.add('open');
        window.verifyAdmin = () => {
            if(document.getElementById('passCode').value === SECRET) {
                isHano = true; localStorage.setItem('isHano', 'true');
                document.getElementById('admin-tag').style.display = 'block';
                closeM('passModal');
                location.reload(); // بنعمل ريفريش عشان زراير الحذف تظهر فوراً
            } else alert("الباسوورد غلط!");
        };

        window.toggleUploadMode = () => {
            const type = document.getElementById('vType').value;
            if(type === 'statuses') {
                document.getElementById('videoUploadMode').style.display = 'none';
                document.getElementById('textUploadMode').style.display = 'block';
            } else {
                document.getElementById('videoUploadMode').style.display = 'block';
                document.getElementById('textUploadMode').style.display = 'none';
            }
        };

        window.checkName = () => {
            if(!currentUserName) { document.getElementById('nameModal').classList.add('open'); return false; }
            return true;
        };
        window.saveName = () => {
            const n = document.getElementById('userNameInput').value.trim();
            if(n) { currentUserName = n; localStorage.setItem('vibes_username', n); closeM('nameModal'); toast("عاش يا " + n + "!"); }
        };

        window.toggleLike = (type, id, currentLikes, element) => {
            if(!element.classList.contains('liked')) {
                element.classList.add('liked');
                element.querySelector('.action-count').innerText = currentLikes + 1;
                update(ref(db, `media/${type}/${id}`), { likes: currentLikes + 1 });
            }
        };

        let activeType = ''; let activeId = '';
        window.openComments = (type, id) => {
            if(!checkName()) return;
            activeType = type; activeId = id;
            document.getElementById('commentsSheet').classList.add('open');
            const list = document.getElementById('commentsList');
            list.innerHTML = '<div style="text-align:center; padding:20px;"><i class="fa-solid fa-spinner fa-spin"></i> بنجيب التعليقات...</div>';
            
            onValue(ref(db, `media/${type}/${id}/comments`), (s) => {
                list.innerHTML = '';
                if(s.exists()) {
                    Object.values(s.val()).forEach(c => {
                        const firstChar = c.name ? c.name.charAt(0).toUpperCase() : '👤';
                        list.innerHTML += `
                            <div class="comment-item">
                                <div class="c-avatar">${firstChar}</div>
                                <div class="c-body">
                                    <span class="c-name">${c.name}</span>
                                    <span class="c-text">${c.text}</span>
                                </div>
                            </div>`;
                    });
                    list.scrollTop = list.scrollHeight;
                } else list.innerHTML = '<div style="color:#666; text-align:center; padding:30px;">كن أول من يعلق! ✨</div>';
            });
        };
        window.closeComments = () => document.getElementById('commentsSheet').classList.remove('open');
        window.sendComment = () => {
            const input = document.getElementById('newComment');
            const txt = input.value.trim();
            if(!txt) return;
            push(ref(db, `media/${activeType}/${activeId}/comments`), { name: currentUserName, text: txt, time: Date.now() }).then(() => input.value = '');
        };

        // ميزة النسخ
        window.copyText = (text) => { navigator.clipboard.writeText(text); toast("تم نسخ الكلام ✅"); };
        
        // ميزة التنزيل (بتحول لينك Cloudinary لتنزيل إجباري)
        window.downloadVid = (url) => {
            let downloadUrl = url.replace('/upload/', '/upload/fl_attachment/');
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = 'Vibes_Video.mp4';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            toast("بدأ التنزيل! ⬇️");
        };

        // ميزة الحذف (لـ HANO بس)
        window.deleteItem = (type, id) => {
            if(confirm("متأكد إنك عايز تمسح الذكرى دي للأبد يا زعيم؟ 🗑️")) {
                remove(ref(db, `media/${type}/${id}`)).then(() => toast("تم الحذف بنجاح! 🗑️"));
            }
        };

        const timeAgo = (t) => {
            const s = Math.floor((new Date() - t) / 1000);
            if(s < 60) return "الآن"; if(s < 3600) return `منذ ${Math.floor(s/60)} دقيقة`;
            if(s < 86400) return `منذ ${Math.floor(s/3600)} ساعة`; return `منذ ${Math.floor(s/86400)} يوم`;
        };

        const drawItem = (item, id, isText) => {
            const type = isText ? 'statuses' : 'videos';
            const likes = item.likes || 0;
            const comments = item.comments ? Object.keys(item.comments).length : 0;
            const canDownload = item.allowDownload !== false; // افتراضي: مسموح لو مش مكتوبة

            let mediaContent = '';
            if(isText) {
                mediaContent = `<div class="status-card"><div class="status-text">"${item.text}"</div></div>`;
            } else {
                mediaContent = `<video controls preload="metadata"><source src="${item.url}" type="video/mp4"></video>
                                <div class="card-top" style="padding-top:10px;"><h3>${item.title}</h3></div>`;
            }

            // أزرار التفاعل
            let actionBtns = `
                <div class="action-group" onclick="toggleLike('${type}', '${id}', ${likes}, this)">
                    <i class="fa-solid fa-heart"></i><span class="action-count">${likes}</span>
                </div>
                <div class="action-group" onclick="openComments('${type}', '${id}')">
                    <i class="fa-solid fa-comment-dots"></i><span class="action-count">${comments}</span>
                </div>`;
                
            // زرار التحميل أو النسخ
            if(isText) {
                actionBtns += `<div class="action-group" title="نسخ الكلام" onclick="copyText('${item.text}')"><i class="fa-solid fa-copy"></i></div>`;
            } else if (canDownload) {
                actionBtns += `<div class="action-group" title="تحميل الفيديو" onclick="downloadVid('${item.url}')"><i class="fa-solid fa-download"></i></div>`;
            } else {
                actionBtns += `<div class="action-group" title="التنزيل مغلق" style="color:#555; cursor:not-allowed;"><i class="fa-solid fa-ban"></i></div>`;
            }

            // زرار الحذف (للأدمن بس)
            let deleteBtn = '';
            if(isHano) {
                deleteBtn = `<div class="action-group" title="حذف" style="color:#ff4b4b; margin-right:auto;" onclick="deleteItem('${type}', '${id}')"><i class="fa-solid fa-trash"></i></div>`;
            } else {
                deleteBtn = `<div class="time-badge" style="margin-right:auto;">${timeAgo(item.time)}</div>`;
            }

            return `
            <div class="card">
                <div class="card-content">
                    ${mediaContent}
                    <div class="action-bar">
                        ${actionBtns}
                        ${deleteBtn}
                    </div>
                    ${isHano ? `<div style="font-size:0.7rem; color:#666; margin-top:5px; text-align:left;">${timeAgo(item.time)}</div>` : ''}
                </div>
            </div>`;
        };

        onValue(ref(db, 'media/videos'), s => {
            const c = document.getElementById('v-data'); c.innerHTML = '';
            if(s.exists()) Object.entries(s.val()).reverse().forEach(([id, v]) => c.innerHTML += drawItem(v, id, false));
        });

        onValue(ref(db, 'media/statuses'), s => {
            const c = document.getElementById('s-data'); c.innerHTML = '';
            if(s.exists()) Object.entries(s.val()).reverse().forEach(([id, v]) => c.innerHTML += drawItem(v, id, true));
        });

        document.getElementById("startUp").onclick = () => {
            const type = document.getElementById('vType').value;
            const st = document.getElementById('upStatus');
            const btn = document.getElementById('startUp');

            if(type === 'statuses') {
                const txt = document.getElementById('sTextInput').value.trim();
                if(!txt) return alert("اكتب الحالة الأول!");
                
                btn.style.display = 'none'; st.style.display = 'block'; st.innerText = 'جاري النشر...';
                
                push(ref(db, `media/statuses`), { text: txt, time: Date.now(), likes: 0 }).then(() => {
                    toast("الحالة نزلت! 📝");
                    closeM('uploadModal'); document.getElementById('sTextInput').value = '';
                    btn.style.display = 'block'; st.style.display = 'none';
                });
            } else {
                const t = document.getElementById('vTitle').value;
                const f = document.getElementById('vFile').files[0];
                const allowDl = document.getElementById('allowDownload').checked; // سحبنا حالة مفتاح التنزيل

                if(!t || !f) return alert("كمل بيانات الفيديو!");

                btn.style.display = 'none'; st.style.display = 'block';
                const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', 'sioenymh');
                const xhr = new XMLHttpRequest();
                xhr.open('POST', "https://api.cloudinary.com/v1_1/dkbm3la7c/video/upload", true);
                
                xhr.upload.onprogress = (e) => { st.innerText = `بيترفع دلوقتي... ${Math.round((e.loaded / e.total) * 100)}%`; };
                xhr.onload = () => {
                    if (xhr.status === 200) {
                        const res = JSON.parse(xhr.responseText);
                        // حفظنا كمان إن الفيديو ده مسموح يتنزل ولا لأ
                        push(ref(db, `media/videos`), { title: t, url: res.secure_url, time: Date.now(), likes: 0, allowDownload: allowDl }).then(() => {
                            toast("الفيديو نزل! 🎬");
                            closeM('uploadModal'); document.getElementById('vTitle').value = ''; document.getElementById('vFile').value = '';
                            btn.style.display = 'block'; st.style.display = 'none';
                        });
                    } else {
                        alert("مشكلة في الرفع!"); btn.style.display = 'block'; st.style.display = 'none';
                    }
                };
                xhr.send(fd);
            }
        };
    </script>
</body>
</html>
