<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibes | HANO V20.0 💎</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        :root { --primary: #00d2ff; --gold: #ffd700; --bg: #04080f; --card-bg: rgba(18, 25, 33, 0.9); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { font-family: 'Cairo', sans-serif; margin: 0; background: var(--bg); color: #fff; min-height: 100vh; overflow-x: hidden; padding-bottom: 100px; }

        .bg-blobs { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; background: #020406; }
        .blob { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.25; animation: float 15s infinite ease-in-out alternate; }
        .blob1 { width: 400px; height: 400px; background: #00d2ff; top: -100px; left: -100px; }
        .blob2 { width: 450px; height: 450px; background: #1a4b8c; bottom: -150px; right: -100px; animation-delay: -7s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(80px, 80px) scale(1.15); } }

        #intro-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100000; transition: opacity 1s ease; }
        .hano-title { font-size: 5rem; font-weight: 900; color: #fff; letter-spacing: 15px; text-shadow: 0 0 30px rgba(255, 215, 0, 0.6); opacity: 0; animation: cinematicReveal 2.5s forwards; }
        @keyframes cinematicReveal { 0% { opacity: 0; transform: scale(0.8); filter: blur(10px); } 100% { opacity: 1; transform: scale(1); filter: blur(0); } }

        #main-app { opacity: 0; transition: opacity 1s ease; visibility: hidden; display: flex; flex-direction: column; align-items: center; }
        #main-app.show { opacity: 1; visibility: visible; }

        header { width: 100%; max-width: 600px; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(4, 8, 15, 0.85); z-index: 100; backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.03); }
        header h1 { margin: 0; font-size: 1.8rem; font-weight: 900; background: linear-gradient(45deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; user-select: none; }

        .container { width: 100%; max-width: 600px; padding: 15px; }
        
        .empty-state { text-align: center; padding: 80px 20px; color: #555; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .empty-state i { font-size: 4.5rem; margin-bottom: 15px; color: #1a252f; }
        .empty-state p { font-size: 1.2rem; font-weight: 800; }

        /* 🔥 تطوير شكل الكارت وتصغير مساحة الفيديو 🔥 */
        .card { background: var(--card-bg); border-radius: 25px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 15px 35px rgba(0,0,0,0.6); overflow: hidden; backdrop-filter: blur(20px); position: relative; width: 100%; transition: all 0.5s ease; }
        .video-container { position: relative; width: 100%; background: #000; cursor: pointer; }
        
        /* شيلنا الـ controls وخلينا الحجم ألم وأشيك */
        video { width: 100%; max-height: 55vh; object-fit: contain; display: block; border-radius: 25px 25px 0 0; }
        
        /* 🎬 أيقونات التحكم المخصصة (بلاي/توقف/صوت) 🎬 */
        .play-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 4rem; color: rgba(255,255,255,0.8); pointer-events: none; opacity: 0; transition: 0.2s; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5)); }
        .play-overlay.show { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        .mute-btn { position: absolute; bottom: 15px; right: 15px; width: 35px; height: 35px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #fff; font-size: 0.9rem; backdrop-filter: blur(5px); z-index: 10; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .mute-btn:active { transform: scale(0.8); }

        .big-heart { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); color: rgba(255, 50, 50, 0.95); font-size: 8rem; z-index: 10; opacity: 0; pointer-events: none; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }
        .big-heart.pop { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }

        .card-content { padding: 15px 20px; }
        .card-top h3 { margin: 0 0 5px 0; font-size: 1.1rem; font-weight: 800; line-height: 1.4; color: #eee; }
        
        .status-card { background: linear-gradient(145deg, rgba(0, 210, 255, 0.08), rgba(0, 0, 0, 0.5)); padding: 60px 25px; border-radius: 25px; margin-bottom: 25px; border: 1px solid rgba(0, 210, 255, 0.15); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .status-text { font-size: 1.6rem; font-weight: 900; line-height: 1.5; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }

        .action-bar { display: flex; gap: 25px; align-items: center; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; }
        .action-group { display: flex; align-items: center; gap: 8px; color: #888; cursor: pointer; transition: 0.2s; font-size: 1.3rem; user-select: none; }
        .action-group:active { transform: scale(0.9); }
        .action-group.liked { color: #ff4b4b; animation: popBtn 0.3s ease; }
        .action-count { font-size: 1.05rem; font-weight: 800; color: #fff; }
        @keyframes popBtn { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        
        .time-badge { font-size: 0.8rem; color: #555; margin-right: auto; font-weight: bold; }

        .nav-bar { position: fixed; bottom: 15px; width: 90%; max-width: 400px; height: 70px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(10, 15, 20, 0.85); backdrop-filter: blur(25px); border-radius: 40px; border: 1px solid rgba(255,255,255,0.08); z-index: 1000; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; transition: 0.3s; cursor: pointer; }
        .nav-link.active { color: var(--primary); transform: translateY(-3px); }
        .nav-link i { font-size: 1.5rem; }
        .nav-link p { font-size: 0.75rem; margin-top: 4px; font-weight: 900; }

        .hano-fab { position: fixed; bottom: 100px; left: 20px; width: 55px; height: 55px; background: linear-gradient(135deg, #ff4b4b, var(--gold)); border-radius: 50%; display: none; justify-content: center; align-items: center; font-size: 1.4rem; color: #000; z-index: 1001; cursor: pointer; border: 3px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(255, 75, 75, 0.4); }

        .bottom-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; height: 75vh; background: #0d1318; border-radius: 35px 35px 0 0; z-index: 99999; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; box-shadow: 0 -10px 50px rgba(0,0,0,0.9); border-top: 1px solid rgba(255,255,255,0.1); }
        .bottom-sheet.open { bottom: 0; }
        .sheet-header { padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); position: relative; }
        .sheet-header h3 { margin: 0; font-weight: 900; font-size: 1.2rem; }
        .close-sheet { position: absolute; left: 20px; top: 20px; font-size: 1.5rem; color: #aaa; cursor: pointer; }
        .comments-list { flex: 1; overflow-y: auto; padding: 20px; }
        .comment-item { display: flex; gap: 12px; margin-bottom: 20px; }
        .c-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--gold)); display: flex; justify-content: center; align-items: center; font-weight: 900; color: #000; flex-shrink: 0; }
        .c-body { background: rgba(255,255,255,0.03); padding: 12px 15px; border-radius: 0 20px 20px 20px; flex: 1; border: 1px solid rgba(255,255,255,0.03); }
        .c-name { display: block; font-size: 0.85rem; color: var(--primary); font-weight: 900; margin-bottom: 4px; }
        .c-text { font-size: 0.95rem; line-height: 1.4; color: #eee; }
        .comment-input-zone { padding: 15px; background: #070a0e; display: flex; gap: 10px; align-items: center; padding-bottom: max(20px, env(safe-area-inset-bottom)); }
        .comment-input-zone input { flex: 1; padding: 16px 20px; border-radius: 30px; border: none; background: rgba(255,255,255,0.08); color: #fff; font-family: 'Cairo'; outline: none; font-size: 1rem; font-weight: 600; }
        .send-btn { width: 52px; height: 52px; border-radius: 50%; background: var(--primary); color: #000; border: none; font-size: 1.3rem; display: flex; justify-content: center; align-items: center; cursor: pointer; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 99999; display: none; justify-content: center; align-items: center; backdrop-filter: blur(15px); }
        .modal-overlay.open { display: flex; }
        .modal-card { width: 90%; max-width: 400px; padding: 30px; border-radius: 35px; background: #0f161c; text-align: center; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        input[type="text"], input[type="password"], select, textarea { width: 100%; padding: 16px; margin: 10px 0; border-radius: 20px; border: none; background: rgba(255,255,255,0.05); color: #fff; font-family: 'Cairo'; outline: none; font-size: 1rem; font-weight: bold; }
        textarea { resize: none; height: 120px; }
        .btn-gold { background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 20px; width: 100%; font-weight: 900; cursor: pointer; font-size: 1.1rem; margin-top: 10px; }
        
        .toggle-box { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 18px; margin: 10px 0; border: 1px solid rgba(255,255,255,0.05); }
        .toggle-box span { font-weight: 800; font-size: 0.95rem; }
        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(22px); }

        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #000; padding: 10px 25px; border-radius: 30px; font-weight: 900; opacity: 0; transition: 0.4s; z-index: 999999; font-size: 0.95rem; }
        .toast.show { opacity: 1; top: 40px; }
    </style>
</head>
<body>

    <div class="bg-blobs"><div class="blob blob1"></div><div class="blob blob2"></div></div>

    <div id="intro-screen">
        <div class="hano-title">HANO</div>
    </div>

    <div class="toast" id="toast">✅</div>

    <div id="main-app">
        <header>
            <h1 onclick="secretAdminTap()">Vibes 👑</h1>
            <div id="admin-tag" style="background: var(--gold); color: #000; padding: 5px 15px; border-radius: 20px; font-weight: 900; font-size: 0.75rem; display: none; box-shadow: 0 0 15px rgba(255,215,0,0.4);">GHOST ADMIN</div>
        </header>

        <div class="container">
            <div id="v-page" class="tab-content">
                <div class="empty-state" id="empty-videos"><i class="fa-solid fa-ghost"></i><p>أنت شفت كل حاجة! الساحة فاضية دلوقتي</p></div>
                <div class="media-grid" id="v-data"></div>
            </div>
            <div id="s-page" class="tab-content" style="display:none;">
                <div class="empty-state" id="empty-statuses"><i class="fa-solid fa-feather"></i><p>مفيش حالات لسه...</p></div>
                <div class="media-grid" id="s-data"></div>
            </div>
        </div>

        <div class="nav-bar">
            <div class="nav-link active" onclick="switchPage('v-page', this)"><i class="fa-solid fa-play"></i><p>ذكريات</p></div>
            <div class="nav-link" onclick="switchPage('s-page', this)"><i class="fa-solid fa-quote-right"></i><p>حالات</p></div>
        </div>

        <div class="hano-fab" id="adminFab" onclick="openAdminModal()"><i class="fa-solid fa-cloud-arrow-up"></i></div>
    </div>

    <div class="bottom-sheet" id="commentsSheet">
        <div class="sheet-header">
            <h3>التعليقات 💬</h3>
            <i class="fa-solid fa-times close-sheet" onclick="closeComments()"></i>
        </div>
        <div class="comments-list" id="commentsList"></div>
        <div class="comment-input-zone">
            <input type="text" id="newComment" placeholder="اكتب تعليقك هنا...">
            <button class="send-btn" onclick="sendComment()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <div class="modal-overlay" id="nameModal">
        <div class="modal-card">
            <h2>دخول سريع 👀</h2>
            <p style="color:#aaa; font-size:0.95rem;">عشان تعرف تعلق لازم نكتب اسمك</p>
            <input type="text" id="userNameInput" placeholder="اسمك إيه يا وحش؟">
            <button class="btn-gold" onclick="saveName()">يلا بينا</button>
            <p onclick="closeM('nameModal')" style="margin-top:20px; color:#ff4b4b; cursor:pointer; font-weight:bold;">إلغاء</p>
        </div>
    </div>

    <div class="modal-overlay" id="passModal">
        <div class="modal-card">
            <h2>بوابة الأشباح 👻</h2>
            <input type="password" id="passCode" placeholder="كلمة السر السريّة...">
            <button class="btn-gold" onclick="verifyAdmin()">دخول</button>
            <p onclick="clearWatchedHistory()" style="margin-top:15px; color:#aaa; font-size:0.8rem; cursor:pointer;"><i class="fa-solid fa-rotate-right"></i> استرجاع الفيديوهات اللي شفتها</p>
            <p onclick="closeM('passModal')" style="margin-top:20px; color:#ff4b4b; cursor:pointer; font-weight:bold;">تراجع</p>
        </div>
    </div>

    <div class="modal-overlay" id="uploadModal">
        <div class="modal-card">
            <h2>نشر جديد ✨</h2>
            <select id="vType" onchange="toggleUploadMode()">
                <option value="videos">رفع فيديو 🎬</option>
                <option value="statuses">كتابة حالة (كلام) 📝</option>
            </select>
            
            <div id="videoUploadMode">
                <input type="text" id="vTitle" placeholder="وصف الفيديو...">
                <input type="file" id="vFile" accept="video/*">
                <div class="toggle-box">
                    <span>السماح للمستخدمين بالتنزيل؟</span>
                    <label class="switch"><input type="checkbox" id="allowDownload" checked><span class="slider"></span></label>
                </div>
            </div>

            <div id="textUploadMode" style="display:none;">
                <textarea id="sTextInput" placeholder="اكتب اللي في قلبك..."></textarea>
            </div>

            <div id="upStatus" style="margin:15px 0; color:var(--primary); font-weight:900; font-size:1.1rem; display:none;">جاري النشر...</div>
            <button class="btn-gold" id="startUp">انشر دلوقتي</button>
            <p onclick="closeM('uploadModal')" style="margin-top:20px; color:#ff4b4b; cursor:pointer; font-weight:bold;">إلغاء</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDoyrNQabdqsX_VGMI8hGTz0DNFRKwcDkg",
            authDomain: "saldjs-74873.firebaseapp.com",
            databaseURL: "https://saldjs-74873-default-rtdb.firebaseio.com",
            projectId: "saldjs-74873",
            storageBucket: "saldjs-74873.firebasestorage.app",
            messagingSenderId: "886959197654",
            appId: "1:886959197654:web:44bc8a27581815accb2877"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let isHano = false;
        const SECRET = "Hano4848";
        let currentUserName = localStorage.getItem('vibes_username');
        let localLikes = JSON.parse(localStorage.getItem('vibes_likes')) || {};
        
        // 👁️ سجل الفيديوهات المتشافة 👁️
        let watchedHistory = JSON.parse(localStorage.getItem('vibes_watched')) || {};

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('intro-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('intro-screen').style.display = 'none';
                    document.getElementById('main-app').classList.add('show');
                }, 1000);
            }, 2500);

            if(localStorage.getItem('isHano') === 'true') {
                isHano = true; document.getElementById('admin-tag').style.display = 'block'; document.getElementById('adminFab').style.display = 'flex';
            }
        });

        let tapCount = 0; let tapTimeout;
        window.secretAdminTap = () => {
            tapCount++; clearTimeout(tapTimeout); tapTimeout = setTimeout(() => tapCount = 0, 1500);
            if(tapCount > 0 && tapCount < 5 && !isHano) toast(`باقي ${5 - tapCount} ضغطات للسر... 🤫`);
            if(tapCount === 5) {
                if(!isHano) document.getElementById('passModal').classList.add('open');
                else toast("أنت مسجل كأدمن بالفعل يا وحش!");
                tapCount = 0;
            }
        };

        window.verifyAdmin = () => {
            if(document.getElementById('passCode').value === SECRET) {
                isHano = true; localStorage.setItem('isHano', 'true');
                document.getElementById('admin-tag').style.display = 'block'; document.getElementById('adminFab').style.display = 'flex';
                closeM('passModal'); toast("تم فتح بوابة الأشباح 👻");
            } else alert("الباسوورد غلط!");
        };

        // استرجاع السجل
        window.clearWatchedHistory = () => {
            localStorage.removeItem('vibes_watched'); watchedHistory = {};
            toast("تم استرجاع كل الفيديوهات! اعمل ريفريش 🔄"); closeM('passModal');
        };

        window.openAdminModal = () => document.getElementById('uploadModal').classList.add('open');
        window.switchPage = (id, el) => { document.querySelectorAll('.tab-content').forEach(x => x.style.display = 'none'); document.querySelectorAll('.nav-link').forEach(x => x.classList.remove('active')); document.getElementById(id).style.display = 'block'; el.classList.add('active'); };
        window.closeM = (id) => document.getElementById(id).classList.remove('open');
        window.toast = (msg) => { const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); };
        window.toggleUploadMode = () => { const type = document.getElementById('vType').value; if(type === 'statuses') { document.getElementById('videoUploadMode').style.display = 'none'; document.getElementById('textUploadMode').style.display = 'block'; } else { document.getElementById('videoUploadMode').style.display = 'block'; document.getElementById('textUploadMode').style.display = 'none'; } };

        window.checkName = () => { if(!currentUserName) { document.getElementById('nameModal').classList.add('open'); return false; } return true; };
        window.saveName = () => { const n = document.getElementById('userNameInput').value.trim(); if(n) { currentUserName = n; localStorage.setItem('vibes_username', n); closeM('nameModal'); toast("نورتنا يا " + n + "!"); } };

        window.toggleLike = (type, id, currentLikes, elementBtn) => {
            localLikes = JSON.parse(localStorage.getItem('vibes_likes')) || {};
            if(!localLikes[id]) {
                elementBtn.classList.add('liked'); elementBtn.querySelector('.action-count').innerText = currentLikes + 1;
                update(ref(db, `media/${type}/${id}`), { likes: currentLikes + 1 }); localLikes[id] = true;
            } else {
                elementBtn.classList.remove('liked'); const newLikes = Math.max(0, currentLikes - 1);
                elementBtn.querySelector('.action-count').innerText = newLikes;
                update(ref(db, `media/${type}/${id}`), { likes: newLikes }); delete localLikes[id];
            }
            localStorage.setItem('vibes_likes', JSON.stringify(localLikes));
        };

        // 🎬 التحكم المخصص في الفيديو (لا نقط ولا Controls) 🎬
        let tapTimer;
        window.handleVideoTap = (e, type, id, likes, btnId) => {
            const vid = document.getElementById(`vid-${id}`);
            const playIcon = document.getElementById(`play-${id}`);
            
            // التفريق بين الضغطة الواحدة (Play/Pause) والضغطة المزدوجة (Like)
            if (e.detail === 1) {
                tapTimer = setTimeout(() => {
                    if (vid.paused) { vid.play(); playIcon.classList.remove('show'); } 
                    else { vid.pause(); playIcon.classList.add('show'); }
                }, 250);
            } else if (e.detail === 2) {
                clearTimeout(tapTimer);
                const heartAnim = e.currentTarget.parentElement.querySelector('.big-heart');
                heartAnim.classList.add('pop'); setTimeout(() => heartAnim.classList.remove('pop'), 600);
                
                localLikes = JSON.parse(localStorage.getItem('vibes_likes')) || {};
                if(!localLikes[id]) toggleLike(type, id, likes, document.getElementById(btnId));
            }
        };

        window.toggleMute = (id, event) => {
            event.stopPropagation(); // عشان ميدوسش Play بالغط
            const vid = document.getElementById(`vid-${id}`);
            const icon = event.currentTarget.querySelector('i');
            vid.muted = !vid.muted;
            if(vid.muted) { icon.classList.remove('fa-volume-high'); icon.classList.add('fa-volume-xmark'); }
            else { icon.classList.remove('fa-volume-xmark'); icon.classList.add('fa-volume-high'); }
        };

        // 👁️ الدالة السحرية لإخفاء الفيديو بعد ما يخلص 👁️
        window.videoEnded = (id) => {
            watchedHistory[id] = true;
            localStorage.setItem('vibes_watched', JSON.stringify(watchedHistory));
            
            const card = document.getElementById(`card-${id}`);
            card.style.transform = "scale(0.8) translateY(-50px)";
            card.style.opacity = "0";
            setTimeout(() => card.style.display = "none", 500);
            toast("تمت المشاهدة.. مش هيرجع تاني! 👻");
        };

        let activeType = ''; let activeId = '';
        window.openComments = (type, id) => {
            if(!checkName()) return;
            activeType = type; activeId = id; document.getElementById('commentsSheet').classList.add('open');
            const list = document.getElementById('commentsList'); list.innerHTML = '<div style="text-align:center; padding:20px;"><i class="fa-solid fa-spinner fa-spin"></i> بنجيب التعليقات...</div>';
            onValue(ref(db, `media/${type}/${id}/comments`), (s) => {
                list.innerHTML = '';
                if(s.exists()) {
                    Object.values(s.val()).forEach(c => {
                        const firstChar = c.name ? c.name.charAt(0).toUpperCase() : '👤';
                        list.innerHTML += `<div class="comment-item"><div class="c-avatar">${firstChar}</div><div class="c-body"><span class="c-name">${c.name}</span><span class="c-text">${c.text}</span></div></div>`;
                    }); list.scrollTop = list.scrollHeight;
                } else list.innerHTML = '<div style="color:#666; text-align:center; padding:30px;">كن أول من يعلق! ✨</div>';
            });
        };
        window.closeComments = () => document.getElementById('commentsSheet').classList.remove('open');
        window.sendComment = () => { const input = document.getElementById('newComment'); const txt = input.value.trim(); if(!txt) return; push(ref(db, `media/${activeType}/${activeId}/comments`), { name: currentUserName, text: txt, time: Date.now() }).then(() => input.value = ''); };

        window.shareItem = (url, title) => { if (navigator.share) { navigator.share({ title: 'Vibes', text: title, url: url }).catch(()=>{}); } else { navigator.clipboard.writeText(url); toast("تم نسخ الرابط 📋"); } };
        window.copyText = (text) => { navigator.clipboard.writeText(text); toast("تم نسخ المقولة 📋"); };
        window.downloadVid = (url) => { let dl = url.replace('/upload/', '/upload/fl_attachment/'); const a = document.createElement('a'); a.href = dl; a.download = 'Vibes_Video.mp4'; document.body.appendChild(a); a.click(); document.body.removeChild(a); toast("بدأ التنزيل! ⬇️"); };
        window.deleteItem = (type, id) => { if(confirm("أكيد عايز تمسح الذكرى دي يا شبح؟ 👻")) remove(ref(db, `media/${type}/${id}`)).then(() => toast("اتمسحت في ثانية 🗑️")); };

        const timeAgo = (t) => { const s = Math.floor((new Date() - t) / 1000); if(s < 60) return "الآن"; if(s < 3600) return `منذ ${Math.floor(s/60)} دقيقة`; if(s < 86400) return `منذ ${Math.floor(s/3600)} ساعة`; return `منذ ${Math.floor(s/86400)} يوم`; };

        const drawItem = (item, id, isText) => {
            // لو الفيديو ده موجود في السجل، مترسموش أساساً!
            if(watchedHistory[id]) return '';

            const type = isText ? 'statuses' : 'videos';
            const likes = item.likes || 0;
            const comments = item.comments ? Object.keys(item.comments).length : 0;
            const canDownload = item.allowDownload !== false;
            const btnId = `like-${id}`;
            const isLikedClass = localLikes[id] ? 'liked' : '';

            let mediaContent = '';
            if(isText) {
                mediaContent = `<div class="status-card"><div class="status-text">"${item.text}"</div></div>`;
            } else {
                mediaContent = `
                    <div class="video-container">
                        <video class="tiktok-vid" id="vid-${id}" playsinline onended="videoEnded('${id}')" onclick="handleVideoTap(event, '${type}', '${id}', ${likes}, '${btnId}')">
                            <source src="${item.url}" type="video/mp4">
                        </video>
                        <i class="fa-solid fa-play play-overlay" id="play-${id}"></i>
                        <div class="mute-btn" onclick="toggleMute('${id}', event)"><i class="fa-solid fa-volume-high"></i></div>
                        <i class="fa-solid fa-heart big-heart"></i>
                    </div>
                    <div class="card-top" style="padding-top:15px;"><h3>${item.title}</h3></div>`;
            }

            let actionBtns = `
                <div class="action-group ${isLikedClass}" id="${btnId}" onclick="toggleLike('${type}', '${id}', ${likes}, this)">
                    <i class="fa-solid fa-heart"></i><span class="action-count">${likes}</span>
                </div>
                <div class="action-group" onclick="openComments('${type}', '${id}')">
                    <i class="fa-solid fa-comment-dots"></i><span class="action-count">${comments}</span>
                </div>`;
                
            if(isText) {
                actionBtns += `<div class="action-group" title="مشاركة" onclick="shareItem('https://jg-sage.vercel.app', '${item.text}')"><i class="fa-solid fa-share"></i></div>`;
                actionBtns += `<div class="action-group" title="نسخ" onclick="copyText('${item.text}')"><i class="fa-solid fa-copy"></i></div>`;
            } else {
                actionBtns += `<div class="action-group" title="مشاركة" onclick="shareItem('${item.url}', '${item.title}')"><i class="fa-solid fa-share"></i></div>`;
                if (canDownload) actionBtns += `<div class="action-group" title="تحميل" onclick="downloadVid('${item.url}')"><i class="fa-solid fa-download"></i></div>`;
                else actionBtns += `<div class="action-group" title="مغلق" style="color:#444; cursor:not-allowed;"><i class="fa-solid fa-ban"></i></div>`;
            }

            let deleteBtn = isHano ? `<div class="action-group" title="حذف" style="color:#ff4b4b; margin-right:auto;" onclick="deleteItem('${type}', '${id}')"><i class="fa-solid fa-trash"></i></div>` : `<div class="time-badge">${timeAgo(item.time)}</div>`;

            return `
            <div class="card" id="card-${id}">
                <div class="card-content" style="padding: 0 0 15px 0;">
                    ${mediaContent}
                    <div class="action-bar" style="padding: 10px 20px 0 20px;">
                        ${actionBtns}
                        ${deleteBtn}
                    </div>
                    ${isHano ? `<div style="font-size:0.75rem; color:#666; margin-top:10px; padding: 0 20px;">${timeAgo(item.time)}</div>` : ''}
                </div>
            </div>`;
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const vid = entry.target;
                const playIcon = document.getElementById(`play-${vid.id.replace('vid-','')}`);
                if (entry.isIntersecting) { vid.play().catch(e=>{}); playIcon.classList.remove('show'); } 
                else { vid.pause(); playIcon.classList.add('show'); }
            });
        }, { threshold: 0.6 });

        onValue(ref(db, 'media/videos'), s => {
            const c = document.getElementById('v-data'); c.innerHTML = '';
            const empty = document.getElementById('empty-videos');
            localLikes = JSON.parse(localStorage.getItem('vibes_likes')) || {};
            watchedHistory = JSON.parse(localStorage.getItem('vibes_watched')) || {};
            
            let hasVideos = false;
            if(s.exists()) {
                Object.entries(s.val()).reverse().forEach(([id, v]) => {
                    const html = drawItem(v, id, false);
                    if(html) { c.innerHTML += html; hasVideos = true; }
                });
                document.querySelectorAll('.tiktok-vid').forEach(v => observer.observe(v));
            }
            if(hasVideos) empty.style.display = 'none'; else empty.style.display = 'flex';
        });

        onValue(ref(db, 'media/statuses'), s => {
            const c = document.getElementById('s-data'); c.innerHTML = '';
            const empty = document.getElementById('empty-statuses');
            localLikes = JSON.parse(localStorage.getItem('vibes_likes')) || {};
            
            if(s.exists()) {
                empty.style.display = 'none';
                Object.entries(s.val()).reverse().forEach(([id, v]) => c.innerHTML += drawItem(v, id, true));
            } else { empty.style.display = 'flex'; }
        });

        document.getElementById("startUp").onclick = () => {
            const type = document.getElementById('vType').value;
            const st = document.getElementById('upStatus');
            const btn = document.getElementById('startUp');

            if(type === 'statuses') {
                const txt = document.getElementById('sTextInput').value.trim();
                if(!txt) return alert("اكتب الحالة الأول!");
                btn.style.display = 'none'; st.style.display = 'block'; st.innerText = 'جاري النشر...';
                push(ref(db, `media/statuses`), { text: txt, time: Date.now(), likes: 0 }).then(() => {
                    toast("الحالة نزلت! 📝"); closeM('uploadModal'); document.getElementById('sTextInput').value = '';
                    btn.style.display = 'block'; st.style.display = 'none';
                });
            } else {
                const t = document.getElementById('vTitle').value;
                const f = document.getElementById('vFile').files[0];
                const allowDl = document.getElementById('allowDownload').checked;
                if(!t || !f) return alert("كمل بيانات الفيديو!");

                btn.style.display = 'none'; st.style.display = 'block';
                const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', 'sioenymh');
                const xhr = new XMLHttpRequest();
                xhr.open('POST', "https://api.cloudinary.com/v1_1/dkbm3la7c/video/upload", true);
                
                xhr.upload.onprogress = (e) => { st.innerText = `بيترفع دلوقتي... ${Math.round((e.loaded / e.total) * 100)}%`; };
                xhr.onload = () => {
                    if (xhr.status === 200) {
                        const res = JSON.parse(xhr.responseText);
                        push(ref(db, `media/videos`), { title: t, url: res.secure_url, time: Date.now(), likes: 0, allowDownload: allowDl }).then(() => {
                            toast("الفيديو نزل! 🎬"); closeM('uploadModal'); document.getElementById('vTitle').value = ''; document.getElementById('vFile').value = '';
                            btn.style.display = 'block'; st.style.display = 'none';
                        });
                    } else { alert("مشكلة في الرفع!"); btn.style.display = 'block'; st.style.display = 'none'; }
                };
                xhr.send(fd);
            }
        };
    </script>
</body>
</html>
